name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Validate Node app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify JavaScript syntax
        run: |
          node --check server.js
          node --check public/js/state.js
          node --check public/js/main.js
          node --check public/js/mini-htmx.js
          node --check public/js/three-background.js
          node --check scripts/copy_motion.js

      - name: Regenerate blackhole.glb
        run: npm run generate:model

      - name: Verify GLB exists
        run: test -s public/models/blackhole.glb

      - name: Start server and smoke test
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid
          sleep 3
          curl --fail http://127.0.0.1:3000/
          curl --fail http://127.0.0.1:3000/api/projects
          curl --fail http://127.0.0.1:3000/models/blackhole.glb --output /tmp/blackhole.glb
          kill $(cat server.pid)
