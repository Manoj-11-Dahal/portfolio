name: Deploy to VPS over SSH

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Node app to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/novachain-studio"; fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "${{ github.server_url }}/${{ github.repository }}.git" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            npm run generate:model
            npm run copy:motion

            if command -v pm2 >/dev/null 2>&1; then
              pm2 start server.js --name novachain-studio --update-env || pm2 restart novachain-studio --update-env
              pm2 save
            else
              echo "PM2 not found. Install with: npm install -g pm2"
              echo "Fallback: starting app with nohup"
              pkill -f "node server.js" || true
              HOST=0.0.0.0 PORT=3000 nohup node server.js > server-live.log 2>&1 &
            fi
