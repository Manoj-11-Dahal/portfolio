services:
  - type: web
    name: novachain-studio
    env: node
    plan: free
    buildCommand: npm ci && npm run generate:model && npm run copy:motion
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
