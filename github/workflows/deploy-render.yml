name: Deploy to Render

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl --fail --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Missing Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "RENDER_DEPLOY_HOOK_URL secret is not configured."
          echo "Create a Render Deploy Hook and save it as a GitHub Actions secret."
          exit 1
